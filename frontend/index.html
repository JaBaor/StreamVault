<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Tracker Dashboard</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --accent-color: #e50914;
      --success-color: #2ec4b6;
      --input-bg: #2a2a2a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--card-bg);
      padding-bottom: 15px;
      margin-bottom: 30px;
    }

    h1 { margin: 0; color: var(--accent-color); }

    /* Forms Layout */
    .forms-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .panel {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    .panel h2 { margin-top: 0; font-size: 1.2rem; color: #fff; border-bottom: 1px solid #333; padding-bottom: 8px; }

    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #aaa; }
    input {
      width: 100%;
      padding: 10px;
      background: var(--input-bg);
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      box-sizing: border-box;
    }
    input:focus { border-color: var(--accent-color); outline: none; }

    button {
      background: var(--accent-color);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
    }
    button:hover { opacity: 0.9; }
    button.secondary { background: #555; }

    /* Content Layout */
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .movie-card {
      background-color: var(--card-bg);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .movie-title { font-size: 1.3rem; margin-top: 0; color: #fff; }
    .movie-info { color: #b3b3b3; font-size: 0.95rem; margin: 5px 0; }
    
    .status-msg { margin-top: 10px; font-size: 0.9rem; font-weight: bold; text-align: center; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div>
        <h1>🎬 FlickBase Engine</h1>
        <p>Full-stack Auth Integration</p>
      </div>
      <div id="authStatus">
        </div>
    </header>

    <div class="forms-section">
      <div class="panel" id="loginPanel">
        <h2>Account Login</h2>
        <form id="loginForm">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="loginUsername" required placeholder="e.g., superadmin">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" required placeholder="••••••••">
          </div>
          <button type="submit">Sign In</button>
        </form>
        <div id="loginMessage" class="status-msg"></div>
      </div>

      <div class="panel" id="adminPanel">
        <h2>Add New Movie (Admin Only)</h2>
        <form id="movieForm">
          <div class="form-group">
            <label>Movie Title</label>
            <input type="text" id="movieTitle" required placeholder="Inception">
          </div>
          <div class="form-group">
            <label>Genre</label>
            <input type="text" id="movieGenre" required placeholder="Sci-Fi">
          </div>
          <div class="form-group">
            <label>Release Year</label>
            <input type="number" id="movieYear" required placeholder="2010">
          </div>
          <button type="submit" style="background-color: var(--success-color);">Publish Movie</button>
        </form>
        <div id="movieMessage" class="status-msg"></div>
      </div>
    </div>

    <h2>Available Movie Catalog</h2>
    <div class="movie-grid" id="movieGrid">
      <p>Loading movies...</p>
    </div>
  </div>

  <script>
    const BASE_URL = "http://localhost:5000/api";
    
    // UI Selectors
    const movieGrid = document.getElementById("movieGrid");
    const loginForm = document.getElementById("loginForm");
    const movieForm = document.getElementById("movieForm");
    const authStatus = document.getElementById("authStatus");
    const loginMessage = document.getElementById("loginMessage");
    const movieMessage = document.getElementById("movieMessage");

    // --- AUTH MANAGEMENT ---
    
    // 1. Login Form Submit
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginMessage.textContent = "";
      
      const username = document.getElementById("loginUsername").value;
      const password = document.getElementById("loginPassword").value;

      try {
        const response = await fetch(`${BASE_URL}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.message || "Login failed");

        // Save token to browser cache
        localStorage.setItem("token", data.token);
        localStorage.setItem("username", username);
        
        loginMessage.style.color = "var(--success-color)";
        loginMessage.textContent = "Logged in successfully!";
        loginForm.reset();
        
        updateAuthUI();
      } catch (err) {
        loginMessage.style.color = "var(--accent-color)";
        loginMessage.textContent = err.message;
      }
    });

    // 2. Refresh UI based on logged-in state
    function updateAuthUI() {
      const token = localStorage.getItem("token");
      const user = localStorage.getItem("username");

      if (token) {
        authStatus.innerHTML = `
          <span>Active: <strong>${user}</strong></span>
          <button class="secondary" onclick="logout()" style="width:auto; padding:5px 10px; margin-left:10px; display:inline-block;">Log Out</button>
        `;
      } else {
        authStatus.innerHTML = `<span>Status: <strong>Anonymous Guest</strong></span>`;
      }
    }

    function logout() {
      localStorage.clear();
      updateAuthUI();
      location.reload();
    }


    // --- MOVIE CRUD OPERATIONS ---

    // 3. Read Catalog (Public Fetch)
    async function loadMovies() {
      try {
        const response = await fetch(`${BASE_URL}/movies`);
        if (!response.ok) throw new Error("Could not load catalog");
        
        const movies = await response.json();
        movieGrid.innerHTML = "";

        if(movies.length === 0) {
          movieGrid.innerHTML = "<p>Catalog empty.</p>";
          return;
        }

        movies.forEach(movie => {
          const card = document.createElement("div");
          card.classList.add("movie-card");
          card.innerHTML = `
            <h3 class="movie-title">${movie.title}</h3>
            <p class="movie-info"><strong>Genre:</strong> ${movie.genre}</p>
            <p class="movie-info"><strong>Year:</strong> ${movie.release_year || movie.year || 'N/A'}</p>
          `;
          movieGrid.appendChild(card);
        });
      } catch (err) {
        movieGrid.innerHTML = `<p style="color:var(--accent-color)">${err.message}</p>`;
      }
    }

    // 4. Create Movie (Authenticated Admin Action)
    movieForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      movieMessage.textContent = "";

      const title = document.getElementById("movieTitle").value;
      const genre = document.getElementById("movieGenre").value;
      const release_year = document.getElementById("movieYear").value;

      // Grab token from storage
      const token = localStorage.getItem("token");

      try {
        const response = await fetch(`${BASE_URL}/movies`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}` // Passing the token!
          },
          body: JSON.stringify({ title, genre, release_year })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.message || "Failed to add movie");

        movieMessage.style.color = "var(--success-color)";
        movieMessage.textContent = "Movie created successfully!";
        movieForm.reset();
        
        // Reload list to see the new entry instantly
        loadMovies(); 
      } catch (err) {
        movieMessage.style.color = "var(--accent-color)";
        movieMessage.textContent = err.message;
      }
    });

    // Run on startup
    updateAuthUI();
    loadMovies();
  </script>
</body>
</html>
